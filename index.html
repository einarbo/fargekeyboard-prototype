<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Fargekeyboard – Hover + Sustain</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      font-size: 1.2em;
      padding: 10px 20px;
      margin-right: 10px;
      cursor: pointer;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .key {
      height: 150px;
      border-radius: 16px;
    }

    .key.active {
      outline: 6px solid white;
      filter: brightness(130%);
    }

    .c { background: red; }
    .d { background: orange; }
    .e { background: yellow; }
    .f { background: green; }
    .g { background: cyan; }
    .a { background: blue; }
    .b { background: purple; }
    .c2 { background: hotpink; }
  </style>
</head>
<body>

  <div class="controls">
    <button id="sustainBtn">Sustain: AV</button>
  </div>

  <div class="keyboard">
    <div class="key c"  data-freq="261.63"></div>
    <div class="key d"  data-freq="293.66"></div>
    <div class="key e"  data-freq="329.63"></div>
    <div class="key f"  data-freq="349.23"></div>
    <div class="key g"  data-freq="392.00"></div>
    <div class="key a"  data-freq="440.00"></div>
    <div class="key b"  data-freq="493.88"></div>
    <div class="key c2" data-freq="523.25"></div>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let sustain = false;
    let activeOscillators = new Map();

    const sustainBtn = document.getElementById("sustainBtn");
    sustainBtn.addEventListener("click", () => {
      sustain = !sustain;
      sustainBtn.textContent = `Sustain: ${sustain ? "PÅ" : "AV"}`;

      if (!sustain) {
        stopAll();
      }
    });

    function playNote(key, freq) {
      if (activeOscillators.has(key)) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);

      osc.connect(gain).connect(audioCtx.destination);
      osc.start();

      activeOscillators.set(key, { osc, gain });
      key.classList.add("active");
    }

    function stopNote(key) {
      const data = activeOscillators.get(key);
      if (!data) return;

      const { osc, gain } = data;
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);

      setTimeout(() => osc.stop(), 250);

      activeOscillators.delete(key);
      key.classList.remove("active");
    }

    function stopAll() {
      activeOscillators.forEach((_, key) => stopNote(key));
    }

    document.querySelectorAll(".key").forEach(key => {
      const freq = Number(key.dataset.freq);

      key.addEventListener("pointerenter", () => {
        audioCtx.resume();
        playNote(key, freq);
      });

      key.addEventListener("pointerleave", () => {
        if (!sustain) {
          stopNote(key);
        }
      });
    });
  </script>

</body>
</html>
